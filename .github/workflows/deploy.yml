name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/professional-website-github-pages-y16je6
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # One-time setup required: in the repo, go to
      # Settings → Pages → Build and deployment → Source → "GitHub Actions".
      # The default GITHUB_TOKEN cannot enable Pages programmatically.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
